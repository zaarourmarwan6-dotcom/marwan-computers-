<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marwan Computers</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1020;
  color:white;
}

header{
  padding:20px;
  background:#111a33;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#151f3d;
  padding:15px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  🛒 Marwan Computers
</header>

<div id="products">جاري التحميل...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApGdzrA4CU5at0B4Qvc8J_Dp3-ElfZV94",
  authDomain: "marwan-computer.firebaseapp.com",
  projectId: "marwan-computer",
  storageBucket: "marwan-computer.appspot.com",
  messagingSenderId: "466148301340",
  appId: "1:466148301340:web:0bd1766ded93d45e09ddd9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){

  const snap = await getDocs(collection(db, "products"));

  const box = document.getElementById("products");
  box.innerHTML = "";

  if(snap.empty){
    box.innerHTML = "<p>لا توجد منتجات حالياً</p>";
    return;
  }

  snap.forEach(doc=>{
    const p = doc.data();

    box.innerHTML += `
      <div class="card">
        <img src="${p.image || ''}">
        <h3>${p.name || ''}</h3>
        <p>${p.description || ''}</p>
        <b>$${p.price || ''}</b>
      </div>
    `;
  });

}

loadProducts();

</script>

</body>
</html>
